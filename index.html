<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Déjà Flood</title>

  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="preconnect" href="https://cartodb-basemaps-a.global.ssl.fastly.net" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="badge">NOLA</div>
      <div>
        <h1>Déjà Flood</h1>
        <p>Puddle Intelligence for Southeast Louisiana</p>
      </div>
    </div>

    <div class="header-actions">
      <button id="refreshBtn" type="button">Refresh</button>
      <label class="toggle">
        <input id="autoRefreshToggle" type="checkbox" checked />
        <span>Auto-refresh</span>
      </label>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel status-panel">
        <h2>Status</h2>
        <div id="statusLine" class="status-line">Loading…</div>
        <div id="updatedLine" class="updated-line">Last update: —</div>
      </section>

      <section class="panel">
        <h2>Layer</h2>
        <div id="layerControls" class="layer-controls"></div>
      </section>

      <section class="panel archive-panel">
        <h2>View</h2>
        <div class="view-tabs">
          <button id="liveViewBtn" class="view-tab active" type="button">Live</button>
          <button id="archiveViewBtn" class="view-tab" type="button">Archive</button>
        </div>
        <div id="archiveControls" class="archive-controls" hidden>
          <label for="archiveDate">Archive date</label>
          <div class="archive-date-row">
            <input id="archiveDate" type="date" />
            <button id="loadArchiveBtn" type="button">Load</button>
          </div>
          <div id="archiveStatus" class="muted">Choose a date to view preserved reports.</div>
        </div>
      </section>

      <section class="panel reports-panel">
        <div class="section-row">
          <h2>Active flood reports</h2>
          <span id="reportCount" class="count-pill">0</span>
        </div>
        <div id="reportList" class="report-list"></div>
      </section>

    </aside>

    <section class="map-wrap">
      <div id="map"></div>
      <div class="map-note">
        Public Streetwise flood report data. Not an official City of New Orleans product.
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
